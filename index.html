<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #000;
            color: #fff;
            min-height: 100vh;
        }

        header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 52px;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        header h1 {
            font-size: 17px;
            font-weight: 600;
            letter-spacing: -0.01em;
        }

        .sidebar {
            position: fixed;
            left: 0;
            top: 52px;
            bottom: 0;
            width: 200px;
            background: rgba(28, 28, 30, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px 0;
            overflow-y: auto;
            z-index: 90;
        }

        .sidebar-item {
            padding: 12px 20px;
            cursor: pointer;
            transition: background 0.2s ease;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.7);
            border-left: 3px solid transparent;
        }

        .sidebar-item:hover {
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
        }

        .sidebar-item.active {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border-left-color: #007aff;
        }

        .sidebar-item .count {
            float: right;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.4);
            background: rgba(255, 255, 255, 0.1);
            padding: 2px 8px;
            border-radius: 10px;
        }

        .main-content {
            margin-left: 200px;
            padding: 72px 20px 40px;
            min-height: 100vh;
        }

        .date-section {
            display: none;
        }

        .date-section.active {
            display: block;
        }

        .date-header {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 12px;
        }

        .image-card {
            position: relative;
            background: #1c1c1e;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            aspect-ratio: 21/9;
        }

        .image-card:hover {
            transform: scale(1.02);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .image-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .image-info {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 10px;
            background: linear-gradient(transparent, rgba(0, 0, 0, 0.8));
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .image-card:hover .image-info {
            opacity: 1;
        }

        .image-name {
            font-size: 11px;
            font-weight: 500;
            color: #fff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .storage-badge {
            display: inline-block;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 10px;
            margin-left: 6px;
        }

        .storage-github {
            background: #238636;
            color: #fff;
        }

        .storage-smms {
            background: #007aff;
            color: #fff;
        }

        .lightbox {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.95);
            display: none;
            flex-direction: column;
            z-index: 200;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .lightbox.active {
            display: flex;
            opacity: 1;
        }

        .lightbox-header {
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .lightbox-title {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.8);
            max-width: 50%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .lightbox-actions {
            display: flex;
            gap: 10px;
        }

        .lightbox-btn {
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 6px;
            color: #fff;
            font-size: 13px;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.2s ease;
        }

        .lightbox-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .lightbox-btn.primary {
            background: #007aff;
            border-color: #007aff;
        }

        .lightbox-btn.primary:hover {
            background: #0051d5;
        }

        .lightbox-content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
        }

        .lightbox-img {
            max-width: 90%;
            max-height: 80vh;
            object-fit: contain;
            border-radius: 4px;
        }

        .nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            border-radius: 50%;
            color: #fff;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s ease;
        }

        .nav-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .nav-prev { left: 20px; }
        .nav-next { right: 20px; }

        .lightbox-footer {
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 13px;
            color: rgba(255, 255, 255, 0.5);
        }

        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255, 255, 255, 0.5);
            font-size: 14px;
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 100%;
                height: auto;
                top: auto;
                bottom: 0;
                display: flex;
                overflow-x: auto;
                border-right: none;
                border-top: 1px solid rgba(255, 255, 255, 0.1);
                padding: 10px;
            }
            
            .sidebar-item {
                white-space: nowrap;
                border-left: none;
                border-bottom: 2px solid transparent;
            }
            
            .sidebar-item.active {
                border-left-color: transparent;
                border-bottom-color: #007aff;
            }
            
            .main-content {
                margin-left: 0;
                margin-bottom: 60px;
                padding: 72px 12px 30px;
            }
            
            .grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
                gap: 8px;
            }

            .lightbox-header {
                padding: 0 10px;
            }

            .lightbox-btn {
                padding: 6px 12px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>Image Gallery</h1>
    </header>

    <div class="sidebar" id="sidebar"></div>

    <div class="main-content" id="mainContent"></div>

    <div class="lightbox" id="lightbox">
        <div class="lightbox-header">
            <div class="lightbox-title" id="lightboxTitle">图片查看</div>
            <div class="lightbox-actions">
                <a href="#" class="lightbox-btn primary" id="downloadBtn" download>下载原图</a>
                <a href="/" class="lightbox-btn">返回画廊</a>
            </div>
        </div>
        <div class="lightbox-content">
            <button class="nav-btn nav-prev" onclick="prevImage()">&lsaquo;</button>
            <div class="loading" id="loading">加载中...</div>
            <img src="" alt="" class="lightbox-img" id="lightboxImg" style="display: none;">
            <button class="nav-btn nav-next" onclick="nextImage()">&rsaquo;</button>
        </div>
        <div class="lightbox-footer">
            <span id="counter">1 / 1</span>
        </div>
    </div>

    <script src="images.json"></script>
    <script>
        let currentDate = "";
        let currentIndex = 0;
        let currentImageList = [];

        function initGallery() {
            const sidebar = document.getElementById('sidebar');
            const mainContent = document.getElementById('mainContent');
            
            const dates = Object.keys(galleryData).sort().reverse();
            currentDate = dates[0];
            
            dates.forEach(date => {
                const item = document.createElement('div');
                item.className = 'sidebar-item' + (date === currentDate ? ' active' : '');
                item.innerHTML = `${date} <span class="count">${galleryData[date].length}</span>`;
                item.onclick = () => switchDate(date);
                sidebar.appendChild(item);
                
                const section = document.createElement('div');
                section.className = 'date-section' + (date === currentDate ? ' active' : '');
                section.id = 'section-' + date;
                
                const header = document.createElement('div');
                header.className = 'date-header';
                header.textContent = date;
                section.appendChild(header);
                
                const grid = document.createElement('div');
                grid.className = 'grid';
                
                galleryData[date].forEach((img, index) => {
                    const card = document.createElement('div');
                    card.className = 'image-card';
                    const storageBadge = img.storage === 'github' 
                        ? '<span class="storage-badge storage-github">GitHub</span>' 
                        : '<span class="storage-badge storage-smms">SMMS</span>';
                    card.innerHTML = `
                        <img src="${img.thumb || img.url}" alt="${img.name}" loading="lazy">
                        <div class="image-info">
                            <div class="image-name">${img.name}${storageBadge}</div>
                        </div>
                    `;
                    card.onclick = () => openLightbox(date, index);
                    grid.appendChild(card);
                });
                
                section.appendChild(grid);
                mainContent.appendChild(section);
            });
        }

        function switchDate(date) {
            currentDate = date;
            document.querySelectorAll('.sidebar-item').forEach(item => item.classList.remove('active'));
            document.querySelectorAll('.date-section').forEach(section => section.classList.remove('active'));
            
            event.target.closest('.sidebar-item').classList.add('active');
            document.getElementById('section-' + date).classList.add('active');
        }

        function openLightbox(date, index) {
            currentDate = date;
            currentImageList = galleryData[date];
            currentIndex = index;
            
            const lightbox = document.getElementById('lightbox');
            const loading = document.getElementById('loading');
            const img = document.getElementById('lightboxImg');
            
            loading.style.display = 'flex';
            img.style.display = 'none';
            lightbox.classList.add('active');
            
            updateLightboxInfo();
            loadImage();
        }

        function loadImage() {
            const img = document.getElementById('lightboxImg');
            const loading = document.getElementById('loading');
            const imageData = currentImageList[currentIndex];
            
            img.onload = () => {
                loading.style.display = 'none';
                img.style.display = 'block';
            };
            
            img.onerror = () => {
                loading.textContent = '加载失败';
            };
            
            img.src = imageData.url;
        }

        function updateLightboxInfo() {
            const imageData = currentImageList[currentIndex];
            document.getElementById('lightboxTitle').textContent = imageData.name;
            document.getElementById('counter').textContent = `${currentIndex + 1} / ${currentImageList.length}`;
            
            const downloadBtn = document.getElementById('downloadBtn');
            downloadBtn.href = imageData.url;
            downloadBtn.download = imageData.name;
        }

        function closeLightbox() {
            document.getElementById('lightbox').classList.remove('active');
        }

        function nextImage() {
            currentIndex = (currentIndex + 1) % currentImageList.length;
            document.getElementById('loading').style.display = 'flex';
            document.getElementById('lightboxImg').style.display = 'none';
            updateLightboxInfo();
            loadImage();
        }

        function prevImage() {
            currentIndex = (currentIndex - 1 + currentImageList.length) % currentImageList.length;
            document.getElementById('loading').style.display = 'flex';
            document.getElementById('lightboxImg').style.display = 'none';
            updateLightboxInfo();
            loadImage();
        }

        document.addEventListener('keydown', (e) => {
            if (!document.getElementById('lightbox').classList.contains('active')) return;
            if (e.key === 'Escape') closeLightbox();
            if (e.key === 'ArrowRight') nextImage();
            if (e.key === 'ArrowLeft') prevImage();
        });

        initGallery();
    </script>
</body>
</html>
