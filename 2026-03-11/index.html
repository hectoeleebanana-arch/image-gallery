<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #000;
            color: #fff;
            min-height: 100vh;
        }

        header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 52px;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        header h1 {
            font-size: 17px;
            font-weight: 600;
            letter-spacing: -0.01em;
        }

        .gallery {
            padding: 80px 20px 40px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .image-card {
            position: relative;
            background: #1c1c1e;
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            aspect-ratio: 21/9;
        }

        .image-card:hover {
            transform: scale(1.02);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        }

        .image-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .image-info {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 16px;
            background: linear-gradient(transparent, rgba(0, 0, 0, 0.8));
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .image-card:hover .image-info {
            opacity: 1;
        }

        .image-name {
            font-size: 13px;
            font-weight: 500;
            color: #fff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .lightbox {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.95);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 200;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .lightbox.active {
            display: flex;
            opacity: 1;
        }

        .lightbox img {
            max-width: 90vw;
            max-height: 90vh;
            object-fit: contain;
            border-radius: 8px;
        }

        .lightbox-close {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 44px;
            height: 44px;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            border-radius: 50%;
            color: #fff;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s ease;
        }

        .lightbox-close:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            border-radius: 50%;
            color: #fff;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s ease;
        }

        .nav-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .nav-prev { left: 20px; }
        .nav-next { right: 20px; }

        .counter {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 14px;
            color: rgba(255, 255, 255, 0.6);
        }

        @media (max-width: 768px) {
            .grid {
                grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
                gap: 12px;
            }
            
            .gallery {
                padding: 70px 12px 30px;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>Image Gallery</h1>
    </header>

    <div class="gallery">
        <div class="grid" id="gallery"></div>
    </div>

    <div class="lightbox" id="lightbox">
        <button class="lightbox-close" onclick="closeLightbox()">&times;</button>
        <button class="nav-btn nav-prev" onclick="prevImage()">&lsaquo;</button>
        <img src="" alt="" id="lightbox-img">
        <button class="nav-btn nav-next" onclick="nextImage()">&rsaquo;</button>
        <div class="counter" id="counter"></div>
    </div>

    <script>
        const images = [
            "car-ad-01-2026-03-11.png",
            "car-ad-02-2026-03-11.png",
            "car-ad-03-2026-03-11.png",
            "car-ad-04-2026-03-11.png",
            "car-ad-wide-01-2026-03-11.png",
            "car-ad-wide-02-2026-03-11.png",
            "car-ad-wide-03-2026-03-11.png",
            "car-ad-wide-04-2026-03-11.png",
            "car-ad-rooftop-01-2026-03-11.png",
            "car-ad-rooftop-02-2026-03-11.png",
            "car-ad-rooftop-03-2026-03-11.png",
            "car-ad-rooftop-04-2026-03-11.png",
            "car-ad-closeup-01-2026-03-11.png",
            "car-ad-closeup-02-2026-03-11.png",
            "car-ad-closeup-03-2026-03-11.png",
            "car-ad-closeup-04-2026-03-11.png",
            "car-ad-front-01-2026-03-11.png",
            "car-ad-front-02-2026-03-11.png",
            "car-ad-front-03-2026-03-11.png",
            "car-ad-front-04-2026-03-11.png",
            "car-ad-side-01-2026-03-11.png",
            "car-ad-side-02-2026-03-11.png",
            "car-ad-side-03-2026-03-11.png",
            "car-ad-side-04-2026-03-11.png",
            "car-ad-side-v2-01-2026-03-11.png",
            "car-ad-side-v2-02-2026-03-11.png",
            "car-ad-side-v2-03-2026-03-11.png",
            "car-ad-side-v2-04-2026-03-11.png"
        ];

        let currentIndex = 0;

        function initGallery() {
            const gallery = document.getElementById('gallery');
            images.forEach((img, index) => {
                const card = document.createElement('div');
                card.className = 'image-card';
                card.innerHTML = `
                    <img src="${img}" alt="${img}" loading="lazy">
                    <div class="image-info">
                        <div class="image-name">${img}</div>
                    </div>
                `;
                card.onclick = () => openLightbox(index);
                gallery.appendChild(card);
            });
        }

        function openLightbox(index) {
            currentIndex = index;
            const lightbox = document.getElementById('lightbox');
            const img = document.getElementById('lightbox-img');
            img.src = images[currentIndex];
            lightbox.classList.add('active');
            updateCounter();
        }

        function closeLightbox() {
            document.getElementById('lightbox').classList.remove('active');
        }

        function nextImage() {
            currentIndex = (currentIndex + 1) % images.length;
            document.getElementById('lightbox-img').src = images[currentIndex];
            updateCounter();
        }

        function prevImage() {
            currentIndex = (currentIndex - 1 + images.length) % images.length;
            document.getElementById('lightbox-img').src = images[currentIndex];
            updateCounter();
        }

        function updateCounter() {
            document.getElementById('counter').textContent = `${currentIndex + 1} / ${images.length}`;
        }

        document.addEventListener('keydown', (e) => {
            if (!document.getElementById('lightbox').classList.contains('active')) return;
            if (e.key === 'Escape') closeLightbox();
            if (e.key === 'ArrowRight') nextImage();
            if (e.key === 'ArrowLeft') prevImage();
        });

        initGallery();
    </script>
</body>
</html>
